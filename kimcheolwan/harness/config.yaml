# 공용 평가 하네스 설정 파일
# ※ 팀원마다 이 파일을 수정해서 자신의 평가 환경에 맞게 사용

# 평가 모드
# "code" — 코드 생성 평가 (week1)
# "web"  — 웹/앱 서비스 평가 (week2)
mode: "web"

# LLM 설정
llm:
  provider: "anthropic"              # "anthropic" | "openai"
  model: "claude-sonnet-4-6"         # ※ 사용할 모델로 교체 (예: gpt-4o, claude-opus-4-6)
  api_key_env: "ANTHROPIC_API_KEY"   # ※ 환경변수 이름 — 키를 직접 여기 쓰지 말 것

# 샌드박스 설정
sandbox:
  timeout_sec: 5                     # 코드 실행 최대 허용 시간 (초)

# 데이터 경로
data:
  # ※ mode에 맞는 파일로 교체
  # code mode: "data/problems.jsonl"
  # web  mode: "data/web_problems.jsonl"
  problems_path: "data/web_problems.jsonl"

# 결과 저장
results:
  output_dir: "results/"             # 채점 결과 저장 폴더

# 웹 평가 설정 (mode: "web" 시 적용)
web:
  framework: "fastapi"
  score_weights:
    status: 0.3      # HTTP 상태 코드 일치율
    schema: 0.4      # 응답 JSON Schema 적합도
    security: 0.3    # 정적 보안 검사 점수
